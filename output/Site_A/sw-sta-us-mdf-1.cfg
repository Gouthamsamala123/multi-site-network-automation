!
! ============================================================
! SWITCH CONFIGURATION: sw-sta-us-mdf-1
! Site: Site A | Location: US – Remote Office
! Generated: 2026-04-02 03:55:29
! Template: switch_config.j2 v2.0
! ============================================================
!
hostname sw-sta-us-mdf-1
!
service timestamps debug datetime msec localtime show-timezone
service timestamps log datetime msec localtime show-timezone
service password-encryption
!
no ip domain-lookup
ip domain-name company.com
!
clock timezone CST -6
clock summer-time CDT recurring
!
enable secret 0 <ENABLE_SECRET>
username admin privilege 15 secret 0 <ADMIN_PASSWORD>
!
! --- STACK ---
switch 1 priority 1
stack-mac persistent timer 0
redundancy
 mode sso
!
! --- VTP / STP ---
vtp mode transparent
spanning-tree mode rapid-pvst
spanning-tree extend system-id
spanning-tree vlan 1-4094 priority 4096
errdisable recovery cause all
errdisable recovery interval 300
!
! --- VLAN DATABASE ---
vlan 3
 name STA-TRANSFER
vlan 5
 name STA-MANAGEMENT
vlan 9
 name STA-AP
vlan 10
 name STA-USER
vlan 18
 name STA-WIFI
vlan 188
 name STA-IOT
vlan 192
 name STA-GUEST
vlan 193
 name STA-CORP
!
! --- SVIs ---
ip routing
!
interface Vlan10
 description User - User data
 ip address 10.100.10.1 255.255.255.0
 ip helper-address 10.100.11.161
 no shutdown
!
interface Vlan18
 description WIFI - Wireless
 ip address 10.100.11.1 255.255.255.128
 ip helper-address 10.100.11.161
 no shutdown
!
interface Vlan188
 description IOT - IoT devices
 ip address 10.100.11.129 255.255.255.224
 ip helper-address 10.100.11.161
 no shutdown
!
interface Vlan3
 description Transfer - SD-WAN link
 ip address 10.100.11.161 255.255.255.240
 no shutdown
!
interface Vlan9
 description AP - AP mgmt
 ip address 10.100.11.193 255.255.255.224
 no shutdown
!
interface Vlan5
 description Management - In-band mgmt
 ip address 10.100.11.225 255.255.255.224
 no shutdown
!
interface Vlan192
 description GUEST - L2 Only
 no ip address
 shutdown
!
interface Vlan193
 description CORP - L2 Only
 no ip address
 shutdown
!
!
! --- UPLINK INTERFACES ---
interface GigabitEthernet1/0/1
 description UPLINK-TO-SD-STA-MDF-1-GE2
 switchport mode trunk
 switchport trunk allowed vlan 3,5,9,10,18,188,192,193
 switchport trunk native vlan 3
 spanning-tree portfast trunk
 spanning-tree bpduguard enable
 no shutdown
!
interface GigabitEthernet1/0/2
 description UPLINK-TO-SD-STA-MDF-1-GE3
 switchport mode trunk
 switchport trunk allowed vlan 3,5,9,10,18,188,192,193
 switchport trunk native vlan 3
 spanning-tree portfast trunk
 spanning-tree bpduguard enable
 no shutdown
!
interface GigabitEthernet2/0/1
 description UPLINK-TO-SD-STA-MDF-2-GE2
 switchport mode trunk
 switchport trunk allowed vlan 3,5,9,10,18,188,192,193
 switchport trunk native vlan 3
 spanning-tree portfast trunk
 spanning-tree bpduguard enable
 no shutdown
!
interface GigabitEthernet2/0/2
 description UPLINK-TO-SD-STA-MDF-2-GE3
 switchport mode trunk
 switchport trunk allowed vlan 3,5,9,10,18,188,192,193
 switchport trunk native vlan 3
 spanning-tree portfast trunk
 spanning-tree bpduguard enable
 no shutdown
!
!
! --- AP INTERFACES ---
interface GigabitEthernet1/0/23
 description AP-AP01
 switchport mode trunk
 switchport trunk native vlan 9
 switchport trunk allowed vlan 9,18,192,193
 spanning-tree portfast trunk
 spanning-tree bpduguard enable
 no shutdown
!
interface GigabitEthernet1/0/24
 description AP-AP03
 switchport mode trunk
 switchport trunk native vlan 9
 switchport trunk allowed vlan 9,18,192,193
 spanning-tree portfast trunk
 spanning-tree bpduguard enable
 no shutdown
!
interface GigabitEthernet2/0/23
 description AP-AP02
 switchport mode trunk
 switchport trunk native vlan 9
 switchport trunk allowed vlan 9,18,192,193
 spanning-tree portfast trunk
 spanning-tree bpduguard enable
 no shutdown
!
interface GigabitEthernet2/0/24
 description AP-AP04
 switchport mode trunk
 switchport trunk native vlan 9
 switchport trunk allowed vlan 9,18,192,193
 spanning-tree portfast trunk
 spanning-tree bpduguard enable
 no shutdown
!
!
! --- USER ACCESS PORTS ---
interface range GigabitEthernet1/0/3-22
 description USER-ACCESS-PORT
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 spanning-tree bpduguard enable
 ip dhcp snooping limit rate 15
 no shutdown
!
interface range GigabitEthernet2/0/3-22
 description USER-ACCESS-PORT
 switchport mode access
 switchport access vlan 10
 spanning-tree portfast
 spanning-tree bpduguard enable
 ip dhcp snooping limit rate 15
 no shutdown
!
!
! --- STATIC ROUTING ---
ip route 0.0.0.0 0.0.0.0 10.100.11.162
!
! --- DHCP SNOOPING ---
ip dhcp snooping
ip dhcp snooping vlan 10,18,188
no ip dhcp snooping information option
ip arp inspection vlan 10,18,188
!
interface GigabitEthernet1/0/1
 ip dhcp snooping trust
 ip arp inspection trust
!
interface GigabitEthernet1/0/2
 ip dhcp snooping trust
 ip arp inspection trust
!
interface GigabitEthernet2/0/1
 ip dhcp snooping trust
 ip arp inspection trust
!
interface GigabitEthernet2/0/2
 ip dhcp snooping trust
 ip arp inspection trust
!
!
! --- AAA / TACACS+ ---
aaa new-model
aaa authentication login default group tacacs+ local
aaa authentication enable default group tacacs+ enable
aaa authorization exec default group tacacs+ local
aaa authorization commands 15 default group tacacs+ local
aaa accounting exec default start-stop group tacacs+
aaa accounting commands 15 default start-stop group tacacs+
!
tacacs server TACACS-PRIMARY
 address ipv4 <TACACS_SERVER_IP>
 key 0 <TACACS_KEY>
!
! --- SNMP ---
snmp-server community <RO_COMMUNITY> RO
snmp-server community <RW_COMMUNITY> RW
snmp-server location STA-US-–-Remote-Office-MDF
snmp-server contact NetworkTeam@company.com
snmp-server enable traps
snmp-server host <MONITORING_SERVER_IP> version 2c <RO_COMMUNITY>
!
! --- LOGGING & NTP ---
logging buffered 65536 informational
logging host <SYSLOG_SERVER>
logging source-interface Vlan5
!
ntp server <NTP_SERVER_1>
ntp server <NTP_SERVER_2>
ntp source Vlan5
!
! --- VTY ACCESS ---
ip access-list standard VTY-ACCESS
 permit 10.100.10.0 0.0.0.31
 permit 10.0.0.0 0.255.255.255
 deny any log
!
line console 0
 logging synchronous
 exec-timeout 15 0
!
line vty 0 15
 transport input ssh
 exec-timeout 15 0
 logging synchronous
 access-class VTY-ACCESS in
!
ip ssh version 2
crypto key generate rsa modulus 2048
!
! --- BANNER ---
banner motd ^
***********************************************
*  AUTHORIZED ACCESS ONLY                     *
*  SW-STA-US-MDF-1
*  Site A - US – Remote Office
*  Contact: NetworkTeam@company.com
***********************************************
^
!
end