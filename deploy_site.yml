---
# =============================================================================
# MULTI-SITE SWITCH DEPLOYMENT PLAYBOOK
# Standardized Network Automation Framework
# =============================================================================
#
# Usage:
#   ansible-playbook deploy_site.yml -i inventory.yml --extra-vars "site=Site_A"
#   ansible-playbook deploy_site.yml -i inventory.yml --check        # Dry-run
#   ansible-playbook deploy_site.yml -i inventory.yml --limit sw-sta-us-mdf-1
#
# Prerequisites:
#   1. Run generate_configs.py first to create .cfg files in ./output/
#   2. Ensure inventory.yml has correct device IPs and credentials
#   3. SSH keys or TACACS credentials configured for target switches

- name: "Deploy Switch Configuration - {{ site | default('ALL') }}"
  hosts: "{{ target_hosts | default('switches') }}"
  gather_facts: no
  connection: network_cli

  vars:
    config_base_dir: "./output"
    backup_dir: "./backups/{{ ansible_date_time.date }}"
    site: "{{ site | default('ALL') }}"

  tasks:
    # ------------------------------------------------------------------
    # Phase 1: Pre-Flight Checks
    # ------------------------------------------------------------------
    - name: "PRE-FLIGHT | Verify config file exists"
      delegate_to: localhost
      stat:
        path: "{{ config_base_dir }}/{{ site | replace(' ', '_') }}/{{ inventory_hostname }}.cfg"
      register: config_file
      failed_when: not config_file.stat.exists

    - name: "PRE-FLIGHT | Ping device to verify reachability"
      ios_ping:
        dest: "{{ ansible_host }}"
        count: 3
      register: ping_result
      ignore_errors: yes

    # ------------------------------------------------------------------
    # Phase 2: Backup Current Config
    # ------------------------------------------------------------------
    - name: "BACKUP | Create backup directory"
      delegate_to: localhost
      file:
        path: "{{ backup_dir }}"
        state: directory

    - name: "BACKUP | Save current running-config"
      ios_command:
        commands:
          - show running-config
      register: running_config

    - name: "BACKUP | Write backup to file"
      delegate_to: localhost
      copy:
        content: "{{ running_config.stdout[0] }}"
        dest: "{{ backup_dir }}/{{ inventory_hostname }}_backup.cfg"

    # ------------------------------------------------------------------
    # Phase 3: Apply Configuration
    # ------------------------------------------------------------------
    - name: "DEPLOY | Apply configuration"
      ios_config:
        src: "{{ config_base_dir }}/{{ site | replace(' ', '_') }}/{{ inventory_hostname }}.cfg"
        save_when: changed
        backup: yes
        backup_options:
          dir_path: "{{ backup_dir }}"
      register: deploy_result
      notify: save_config

    - name: "DEPLOY | Report changes"
      debug:
        msg: "{{ inventory_hostname }}: {{ deploy_result.changed | ternary('CHANGES APPLIED', 'NO CHANGES') }}"

    # ------------------------------------------------------------------
    # Phase 4: Post-Deployment Validation
    # ------------------------------------------------------------------
    - name: "VALIDATE | Check VLANs"
      ios_command:
        commands: [ "show vlan brief" ]
      register: vlan_check

    - name: "VALIDATE | Check interfaces"
      ios_command:
        commands: [ "show ip interface brief" ]
      register: intf_check

    - name: "VALIDATE | Check routing table"
      ios_command:
        commands: [ "show ip route summary" ]
      register: route_check

    - name: "VALIDATE | Check spanning-tree"
      ios_command:
        commands: [ "show spanning-tree summary" ]
      register: stp_check

    - name: "VALIDATE | Save validation report"
      delegate_to: localhost
      copy:
        content: |
          ================================================
          POST-DEPLOYMENT VALIDATION: {{ inventory_hostname }}
          Date: {{ ansible_date_time.iso8601 }}
          ================================================

          === VLAN STATUS ===
          {{ vlan_check.stdout[0] }}

          === INTERFACE STATUS ===
          {{ intf_check.stdout[0] }}

          === ROUTING SUMMARY ===
          {{ route_check.stdout[0] }}

          === STP SUMMARY ===
          {{ stp_check.stdout[0] }}
        dest: "{{ backup_dir }}/{{ inventory_hostname }}_validation.txt"

  handlers:
    - name: save_config
      ios_command:
        commands:
          - write memory
